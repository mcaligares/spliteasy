<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background-color:#f9fafb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="400" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:16px;border:1px solid #e5e7eb;padding:40px;">
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <h1 style="margin:0;font-size:24px;font-weight:700;color:#4f46e5;">SplitEasy</h1>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:16px;">
              <p style="margin:0;font-size:16px;color:#374151;">Tu código de verificación</p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <div style="background:#f3f4f6;border-radius:12px;padding:20px;letter-spacing:8px;font-size:32px;font-weight:700;color:#4f46e5;">{{ .Token }}</div>
            </td>
          </tr>
          <tr>
            <td align="center">
              <p style="margin:0;font-size:14px;color:#6b7280;">Este código expira en 10 minutos.<br>Si no solicitaste este código, ignorá este email.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
